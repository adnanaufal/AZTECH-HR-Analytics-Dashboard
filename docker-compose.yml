# ==========================================
# HR Analytics Dashboard — AZ Tech
# Docker Compose — Development
# ==========================================

services:
  dashboard:
    build: .
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
